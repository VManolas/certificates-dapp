name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_CHAIN_ID: '300'
          VITE_RPC_URL: 'https://sepolia.era.zksync.dev'
          VITE_ENVIRONMENT: 'staging'
          VITE_INSTITUTION_REGISTRY_ADDRESS: ${{ secrets.VITE_INSTITUTION_REGISTRY_ADDRESS }}
          VITE_CERTIFICATE_REGISTRY_ADDRESS: ${{ secrets.VITE_CERTIFICATE_REGISTRY_ADDRESS }}
          VITE_EMPLOYER_REGISTRY_ADDRESS: ${{ secrets.VITE_EMPLOYER_REGISTRY_ADDRESS }}
          VITE_ZK_AUTH_REGISTRY_ADDRESS: ${{ secrets.VITE_ZK_AUTH_REGISTRY_ADDRESS }}
          VITE_VERIFIER_ADAPTER_ADDRESS: ${{ secrets.VITE_VERIFIER_ADAPTER_ADDRESS }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
